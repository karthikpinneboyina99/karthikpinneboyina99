name: Update README

on:
  schedule:
    # Runs once a day at 03:00 UTC (~08:30 IST). Edit the cron if you want
    # a different time — https://crontab.guru is handy for this.
    - cron: '0 3 * * *'
  workflow_dispatch: {}   # adds a "Run workflow" button so you can trigger it manually
  push:
    branches: [main]
    paths-ignore:
      - README.md          # don't re-trigger on the commit this workflow itself makes

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate README sections
        run: node generate-readme.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: karthikpinneboyina99

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: auto-update README [skip ci]"
          git push
