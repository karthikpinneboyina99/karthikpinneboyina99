name: Update Projects

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Repositories
        run: |
          curl -s https://api.github.com/users/karthikpinneboyina99/repos > repos.json

      - name: Update README
        run: |
          python3 << 'EOF'
          import json,re

          with open("repos.json") as f:
              repos=json.load(f)

          repos=sorted(
              repos,
              key=lambda x:x["updated_at"],
              reverse=True
          )

          repos=repos[:5]

          projects="\n".join(
              f"- [{r['name']}]({r['html_url']})"
              for r in repos
          )

          with open("README.md") as f:
              readme=f.read()

          start="<!--START_SECTION:projects-->"
          end="<!--END_SECTION:projects-->"

          replacement=f"{start}\n{projects}\n{end}"

          readme=re.sub(
              f"{start}[\\s\\S]*?{end}",
              replacement,
              readme
          )

          with open("README.md","w") as f:
              f.write(readme)
          EOF

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add README.md

          git diff --staged --quiet || (
            git commit -m "Auto update projects"
            git push
          )
